<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Merit Hill Capital</title>
  <meta name="robots" content="noindex">
  <style>
    :root { --navy:#23427b; --gold:#b49430; --teal:#009db7; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:#23427b; color:#fff; text-align:center; padding:40px 24px;
      font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif; }
    .wrap { max-width:560px; }
    svg.logo { width:64px; height:auto; margin:0 auto 28px; display:block; }
    .code { font-family:Georgia,serif; font-size:96px; line-height:1; color:var(--gold); margin:0; }
    h1 { font-family:Georgia,serif; font-weight:400; font-size:30px; margin:14px 0 10px; }
    p { color:rgba(255,255,255,.82); font-size:17px; line-height:1.6; margin:0 0 28px; }
    a.btn { display:inline-block; background:var(--teal); color:#fff; text-decoration:none;
      text-transform:uppercase; letter-spacing:.04em; font-size:14px; font-weight:600;
      padding:13px 28px; transition:background .2s; }
    a.btn:hover { background:var(--gold); }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="logo" viewBox="0 0 120 70" aria-hidden="true">
      <polygon points="14,58 44,58 29,20" fill="#b49430"/>
      <polygon points="38,58 82,58 60,8" fill="#3a5a9a"/>
      <polygon points="74,58 110,58 92,22" fill="#6f8bc0"/>
    </svg>
    <p class="code">404</p>
    <h1>Page Not Found</h1>
    <p>The page you&#8217;re looking for doesn&#8217;t exist or has moved. Let&#8217;s get you back on track.</p>
    <a class="btn" href="/">Return Home</a>
  </div>
</body>
</html>
